var G_KEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

function getPartidosOrdenados(fg, fj) {
  var r = [];
  [1,2,3].forEach(function(j) {
    if (fj && parseInt(fj) !== j) return;
    // Grupos en orden alfabГ©tico Aв†’L dentro de cada jornada
    ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(function(g) {
      if (fg && fg !== g) return;
      PARTIDOS.forEach(function(p) {
        if (p.g === g && p.j === j) r.push(p);
      });
    });
  });
  return r;
}

var DATA = {participantes:[], pronos:{}, resultados:{}};
var ttOn = false, activeTab = 'ranking', openRankId = null;

function getSigno(gl,gv){ return gl>gv?'1':gl===gv?'X':'2'; }
function calcPts(pick,res){
  if(!res||!pick) return null;
  var p=res.split('-'); if(p.length!==2) return null;
  var gl=parseInt(p[0],10),gv=parseInt(p[1],10);
  if(isNaN(gl)||isNaN(gv)) return null;
  return pick===getSigno(gl,gv)?1:0;
}
function calcStats(nombre){
  var pr=DATA.pronos[nombre]||{},pts=0,jug=0,ac=0;
  PARTIDOS.forEach(function(p){
    var res=DATA.resultados[p.id];
    if(res){jug++;var x=calcPts(pr[p.id],res);if(x===1){pts++;ac++;}}
  });
  return {pts:pts,jugados:jug,aciertos:ac};
}

function switchTab(tab,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  document.getElementById('s-'+tab).classList.add('active');
  btn.classList.add('active');
  activeTab=tab; window.scrollTo(0,0);
  if(tab==='ranking') renderRanking();
  if(tab==='picks') renderPicks();
  if(tab==='scores') renderScores();
}

function statCard(val,lbl){return '<div class="sc"><div class="sv">'+val+'</div><div class="sl">'+lbl+'</div></div>';}
function renderRanking(){
  var jugados=Object.keys(DATA.resultados).length;
  var stats=DATA.participantes.map(function(p){return calcStats(p);});
  var maxPts=stats.reduce(function(m,s){return Math.max(m,s.pts);},0);
  document.getElementById('stats-row').innerHTML=
    statCard(DATA.participantes.length,'JUGADORES')+
    statCard(maxPts+'pts','LГЌDER')+
    statCard(jugados,'JUGADOS')+
    statCard(72,'TOTAL');
  var ranked=DATA.participantes.map(function(p,i){return {n:p,s:stats[i]};});
  ranked.sort(function(a,b){return b.s.pts-a.s.pts;});
  var html='';
  ranked.forEach(function(r,idx){
    var pos=idx+1,ps=pos===1?'рџҐ‡':pos===2?'рџҐ€':pos===3?'рџҐ‰':pos;
    var bh=maxPts>0?Math.round((r.s.pts/maxPts)*100):0;
    var isOpen=openRankId===r.n;
    html+='<div class="rr">';
    html+='<div class="rrhd" onclick="toggleDetail(\''+esc(r.n)+'\')">';
    html+='<div class="rpos">'+ps+'</div>';
    html+='<div class="rbw"><div class="rb" style="height:'+bh+'%"></div></div>';
    html+='<div class="ri"><div class="rn">'+esc(r.n)+'</div>';
    html+='<div class="rs">'+r.s.jugados+' jugados В· '+r.s.aciertos+' aciertos</div></div>';
    html+='<div class="rp">'+r.s.pts+'</div>';
    html+='<span class="rch'+(isOpen?' open':'')+'" >в–ј</span>';
    html+='</div>';
    html+='<div class="bkd'+(isOpen?' open':'')+'" id="bd-'+esc(r.n)+'">';
    if(isOpen) html+=buildBkd(r.n);
    html+='</div></div>';
  });
  document.getElementById('ranking-list').innerHTML=html;
}
function toggleDetail(nombre){
  openRankId=openRankId===nombre?null:nombre;
  renderRanking();
}
function buildBkd(nombre){
  var pr=DATA.pronos[nombre]||{};
  var html='<div style="padding:8px 10px;font-size:12px;font-weight:600;color:var(--txt2);">'+esc(nombre)+' вЂ” desglose</div>';
  html+='<table><thead><tr><th>Grp</th><th style="text-align:left">Partido</th><th>Pick</th><th>Real</th><th>Pts</th></tr></thead><tbody>';
  var lastJ=null;
  getPartidosOrdenados('','').forEach(function(p){
    if(lastJ!==p.j){html+='<tr class="sr"><td colspan="5">в–ё JORNADA '+p.j+'</td></tr>';lastJ=p.j;}
    var pick=pr[p.id]||'',res=DATA.resultados[p.id]||'';
    var pts=calcPts(pick,res);
    var chip=pts===null?'<span class="cp">?</span>':pts===1?'<span class="chip cg">+1</span>':'<span class="chip cgr">0</span>';
    var signo='';
    if(res){var sp=res.split('-');if(sp.length===2){var gl=parseInt(sp[0],10),gv=parseInt(sp[1],10);if(!isNaN(gl)&&!isNaN(gv))signo=getSigno(gl,gv);}}
    html+='<tr><td><span class="bdg">G'+p.g+'</span></td>';
    html+='<td class="tdm">'+p.l.e+' '+esc(p.l.n)+' вЂ“ '+p.v.e+' '+esc(p.v.n)+'</td>';
    html+='<td><b style="color:var(--cyan)">'+(pick||'?')+'</b></td>';
    html+='<td>'+(signo||(res?res:'вЂ“'))+'</td>';
    html+='<td>'+chip+'</td></tr>';
  });
  html+='</tbody></table>';
  return html;
}
function renderPicks(){
  var nombre=document.getElementById('selp').value;
  var fg=document.getElementById('selg').value;
  var fj=document.getElementById('selj').value;
  if(!nombre){document.getElementById('picks-list').innerHTML='<div class="np">SELECCIONA UN PARTICIPANTE</div>';return;}
  var pr=DATA.pronos[nombre]||{};
  var partidos=getPartidosOrdenados(fg,fj);
  var html='',lastJ=null,lastG=null;
  partidos.forEach(function(p){
    if(!fj&&lastJ!==p.j){html+='<div class="slbl">в–ё JORNADA '+p.j+'</div>';lastJ=p.j;lastG=null;}
    if(!fg&&lastG!==p.g){html+='<div class="glbl">GRUPO '+p.g+'</div>';lastG=p.g;}
    var pick=pr[p.id]||'',res=DATA.resultados[p.id]||'';
    var pts=calcPts(pick,res);
    var chip=pts===null?'<span class="cp" style="font-size:11px">pendiente</span>':pts===1?'<span class="chip cg">вњ“ +1</span>':'<span class="chip cgr">вњ— 0</span>';
    var signo='';
    if(res){var sp=res.split('-');if(sp.length===2){var gl=parseInt(sp[0],10),gv=parseInt(sp[1],10);if(!isNaN(gl)&&!isNaN(gv))signo=getSigno(gl,gv);}}
    html+='<div class="mc">';
    html+='<div class="mct"><span class="bdg">G'+p.g+' В· J'+p.j+'</span>';
    html+='<span class="mte">'+p.l.e+' '+esc(p.l.n)+' вЂ“ '+p.v.e+' '+esc(p.v.n)+'</span>'+chip+'</div>';
    html+='<div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;">';
    html+='<span class="mpk">'+(pick||'вЂ“')+'</span>';
    if(signo)html+='<span style="font-size:12px;color:var(--txt2)">Real: <b style="color:var(--txt)">'+signo+'</b> ('+res+')</span>';
    html+='</div><div class="msb">'+p.f+(res?' В· '+res:'')+'</div></div>';
  });
  if(!html)html='<div class="np">Sin partidos para este filtro</div>';
  document.getElementById('picks-list').innerHTML=html;
}



var sGrp='';
function setSGrp(g,btn){
  sGrp=g;
  document.querySelectorAll('#score-pills .pill').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  renderScores();
}
function renderScores(){
  var partidos=getPartidosOrdenados(sGrp,'');
  var html='',lastJ=null,lastG=null;
  partidos.forEach(function(p){
    if(lastJ!==p.j){html+='<div class="slbl">в–ё JORNADA '+p.j+'</div>';lastJ=p.j;lastG=null;}
    if(!sGrp&&lastG!==p.g){html+='<div class="glbl">GRUPO '+p.g+'</div>';lastG=p.g;}
    var res=DATA.resultados[p.id]||'';
    var pts=res?res.split('-'):['',''];
    var played=res!=='';
    html+='<div class="scc" id="sc-'+p.id+'">';
    html+='<div class="sct"><span class="bdg">G'+p.g+' В· J'+p.j+'</span>';
    html+='<span class="mdot '+(played?'dp':'dn')+'" id="dot-'+p.id+'"></span>';
    html+='<span style="font-size:11px;color:var(--txt2);">'+p.f+'</span></div>';
    html+='<div class="scr">';
    html+='<div class="tlbl">'+p.l.e+' '+esc(p.l.n)+'</div>';
    html+='<input class="si" id="gl-'+p.id+'" type="number" inputmode="numeric" min="0" max="20" value="'+esc(pts[0]||'')+'" placeholder="вЂ“">';
    html+='<span class="ssep">вЂ“</span>';
    html+='<input class="si" id="gv-'+p.id+'" type="number" inputmode="numeric" min="0" max="20" value="'+esc(pts[1]||'')+'" placeholder="вЂ“">';
    html+='<div class="tlbl">'+p.v.e+' '+esc(p.v.n)+'</div>';
    html+='</div>';
    html+='<div class="sca">';
    html+='<button class="bsv" onclick="guardar(\''+p.id+'\')">Guardar</button>';
    html+='<button class="bdl" onclick="borrar(\''+p.id+'\')">вњ• Borrar</button>';
    html+='</div>';
    html+='<div class="cfok" id="cf-'+p.id+'"></div>';
    html+='</div>';
  });
  if(!html)html='<div class="np">Sin partidos</div>';
  document.getElementById('scores-list').innerHTML=html;
}
function guardar(id){
  var gl=document.getElementById('gl-'+id).value.trim();
  var gv=document.getElementById('gv-'+id).value.trim();
  if(gl===''&&gv===''){borrar(id);return;}
  if(gl===''||gv===''){showCf(id,'вљ  Introduce ambos goles',true);return;}
  DATA.resultados[id]=gl+'-'+gv;
  apiPut(DATA,function(err){
    if(!err){showCf(id,'в–ё Guardado en la nube вњ“',false);updDot(id,true);if(activeTab==='ranking')renderRanking();}
    else showCf(id,'вњ— Error al guardar',true);
  });
}
function borrar(id){
  delete DATA.resultados[id];
  var gl=document.getElementById('gl-'+id),gv=document.getElementById('gv-'+id);
  if(gl)gl.value='';if(gv)gv.value='';
  apiPut(DATA,function(err){
    if(!err){showCf(id,'в–ё Resultado borrado вњ“',true);updDot(id,false);if(activeTab==='ranking')renderRanking();}
    else showCf(id,'вњ— Error al borrar',true);
  });
}
function updDot(id,played){
  var d=document.getElementById('dot-'+id);
  if(d)d.className='mdot '+(played?'dp':'dn');
}
function showCf(id,msg,isDel){
  var el=document.getElementById('cf-'+id);
  if(!el)return;
  el.className=isDel?'cfdl':'cfok';
  el.textContent=msg;
  setTimeout(function(){if(el)el.textContent='';},2500);
}


function apiGet(cb){
  syncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('GET',BIN_URL+'/latest',true);
  xhr.setRequestHeader('X-Master-Key',MASTER_KEY);
  xhr.setRequestHeader('X-Bin-Meta','false');
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    if(xhr.status===200){try{var d=JSON.parse(xhr.responseText);syncDot('ok');cb(null,d);}catch(e){syncDot('error');cb(e);}}
    else{syncDot('error');cb(new Error('HTTP '+xhr.status));}
  };
  xhr.onerror=function(){syncDot('error');cb(new Error('network'));};
  xhr.send();
}

function apiPut(data,cb){
  syncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('PUT',BIN_URL,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('X-Master-Key',MASTER_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    if(xhr.status===200){syncDot('ok');if(cb)cb(null);}
    else{syncDot('error');if(cb)cb(new Error('HTTP '+xhr.status));}
  };
  xhr.onerror=function(){syncDot('error');if(cb)cb(new Error('network'));};
  xhr.send(JSON.stringify(data));
}

function loadData(){
  apiGet(function(err,d){
    if(err||!d||!d.participantes||!d.participantes.length){
      document.getElementById('ltxt').textContent='ERROR DE CONEXIГ“N';
      syncDot('error');
      setTimeout(function(){hideLoading();},1200);
    } else {
      DATA=d; hideLoading(); initUI();
    }
  });
}

loadData();
</script>
