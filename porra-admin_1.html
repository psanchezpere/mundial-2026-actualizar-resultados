<style>
:root {
  --bg: #070f1a; --surf: #0a1628; --surf2: #0d1f38;
  --cyan: #00ffc8; --cyan12: rgba(0,255,200,.12); --cyan25: rgba(0,255,200,.25);
  --gold: #f0b429; --txt: #e8f4f0; --txt2: #7a9e96; --txt3: #3a5e58;
  --brd: rgba(0,255,200,.14); --brd2: rgba(0,255,200,.30);
  --hh: 54px; --nh: 56px;
  --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;}
body{
  background:var(--bg);
  padding-top:calc(var(--hh) + var(--sat));
  padding-bottom:calc(var(--nh) + var(--sab));
  -webkit-overflow-scrolling:touch;
  min-height:100vh; font-size:14px;
}
#hdr{
  position:fixed;top:0;left:0;right:0;
  height:calc(54px + var(--sat));padding-top:var(--sat);
  background:rgba(7,15,26,.97);border-bottom:1px solid var(--brd);
  z-index:500;display:-webkit-flex;display:flex;

}
#hdr-logo{font-size:15px;font-weight:700;color:var(--gold);letter-spacing:.08em;-webkit-flex:1;flex:1;}
#hdr-tag{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--gold);

#btn-teletexto{

}
#nav{
  position:fixed;bottom:0;left:0;right:0;

}
.nav-btn{

.nav-btn .ni{font-size:17px;}

.screen{display:none;padding:14px 12px;}
.screen.active{display:block;}
#loading-screen{

  -webkit-justify-content:center;justify-content:center;

.spinner{

@keyframes spin{to{transform:rotate(360deg);}}
#loading-txt{color:var(--txt2);font-size:13px;letter-spacing:.08em;}
.stats-row{display:-webkit-flex;display:flex;gap:8px;margin-bottom:14px;}
.stat-card{

.rank-row{

.breakdown{display:none;border-top:1px solid var(--brd);overflow-x:auto;-webkit-overflow-scrolling:touch;}

.pills::-webkit-scrollbar{display:none;}
.pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--brd);background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;min-height:34px;}
.pill.active{background:var(--cyan25);color:var(--cyan);border-color:var(--cyan);}

.score-top{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin-bottom:8px;}

</style>

<script>
// ===================== CONFIG — ADMIN (lectura + escritura) =====================
var BIN_ID   = '6a2ac086da38895dfeaddab0';
var MASTER_KEY = '$2a$10$GIQhqjikc8jJPqHZxAYxuO20.FtSI3Ng5jOpARqHWMaO9/UcJmMSi';
var BIN_URL  = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ===================== PARTIDOS =====================
var GROUPS = {
  A:[{n:'México',e:'🇲🇽'},{n:'Sudáfrica',e:'🇿🇦'},{n:'Corea del Sur',e:'🇰🇷'},{n:'Chequia',e:'🇨🇿'}],
  B:[{n:'Canadá',e:'🇨🇦'},{n:'Bosnia-Herz.',e:'🇧🇦'},{n:'Qatar',e:'🇶🇦'},{n:'Suiza',e:'🇨🇭'}],
  C:[{n:'Haití',e:'🇭🇹'},{n:'Escocia',e:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},{n:'Brasil',e:'🇧🇷'},{n:'Marruecos',e:'🇲🇦'}],
  D:[{n:'EE.UU.',e:'🇺🇸'},{n:'Paraguay',e:'🇵🇾'},{n:'Australia',e:'🇦🇺'},{n:'Turquía',e:'🇹🇷'}],
  E:[{n:'C.Marfil',e:'🇨🇮'},{n:'Ecuador',e:'🇪🇨'},{n:'Alemania',e:'🇩🇪'},{n:'Curazao',e:'🇨🇼'}],
  F:[{n:'P.Bajos',e:'🇳🇱'},{n:'Japón',e:'🇯🇵'},{n:'Suecia',e:'🇸🇪'},{n:'Túnez',e:'🇹🇳'}],
  G:[{n:'Irán',e:'🇮🇷'},{n:'N.Zelanda',e:'🇳🇿'},{n:'Bélgica',e:'🇧🇪'},{n:'Egipto',e:'🇪🇬'}],
  H:[{n:'Arabia S.',e:'🇸🇦'},{n:'Uruguay',e:'🇺🇾'},{n:'España',e:'🇪🇸'},{n:'Cabo Verde',e:'🇨🇻'}],
  I:[{n:'Francia',e:'🇫🇷'},{n:'Senegal',e:'🇸🇳'},{n:'Noruega',e:'🇳🇴'},{n:'Irak',e:'🇮🇶'}],
  J:[{n:'Argentina',e:'🇦🇷'},{n:'Argelia',e:'🇩🇿'},{n:'Austria',e:'🇦🇹'},{n:'Jordania',e:'🇯🇴'}],
  K:[{n:'Portugal',e:'🇵🇹'},{n:'Colombia',e:'🇨🇴'},{n:'Uzbekistán',e:'🇺🇿'},{n:'R.D.Congo',e:'🇨🇩'}],
  L:[{n:'Inglaterra',e:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Croacia',e:'🇭🇷'},{n:'Ghana',e:'🇬🇭'},{n:'Panamá',e:'🇵🇦'}]
};
var G_KEYS = Object.keys(GROUPS);
var PARTIDOS = [];
G_KEYS.forEach(function(g) {
  var eq=GROUPS[g];
  [{j:1,l:0,v:1},{j:1,l:2,v:3},{j:2,l:0,v:2},{j:2,l:1,v:3},{j:3,l:0,v:3},{j:3,l:1,v:2}]
  .forEach(function(p,i){
    PARTIDOS.push({id:g.toLowerCase()+(i+1),g:g,j:p.j,
      f:p.j===1?'11-17 Jun':p.j===2?'18-23 Jun':'24-27 Jun',
      l:eq[p.l],v:eq[p.v]});
  });
});

function getPartidosOrdenados(fg,fj) {
  var r=[];
  [1,2,3].forEach(function(j){
    if(fj&&parseInt(fj)!==j) return;
    G_KEYS.forEach(function(g){
      if(fg&&fg!==g) return;
      PARTIDOS.forEach(function(p){ if(p.g===g&&p.j===j) r.push(p); });
    });
  });
  return r;
}

// ===================== ESTADO =====================
var DATA = {participantes:[],pronos:{},resultados:{}};
var teletextoOn = false;
var activeTab = 'ranking';
var scoreGrpFilter = '';
var openRankId = null;

// ===================== PUNTUACIÓN =====================
function getSigno(gl,gv){ return gl>gv?'1':gl===gv?'X':'2'; }
function calcPuntos(pick,res){
  if(!res||!pick) return null;
  var p=res.split('-'); if(p.length!==2) return null;
  var gl=parseInt(p[0],10),gv=parseInt(p[1],10);
  if(isNaN(gl)||isNaN(gv)) return null;
  return pick===getSigno(gl,gv)?1:0;
}
function calcStats(nombre){
  var pr=DATA.pronos[nombre]||{},pts=0,jug=0,ac=0;
  PARTIDOS.forEach(function(p){
    var res=DATA.resultados[p.id];
    if(res){jug++;var x=calcPuntos(pr[p.id],res);if(x===1){pts++;ac++;}}
  });
  return {pts:pts,jugados:jug,aciertos:ac};
}

// ===================== API — MASTER KEY (GET + PUT) =====================
function syncDot(s){ document.getElementById('sync-dot').className='sync-'+s; }

function apiGet(cb){
  syncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('GET',BIN_URL+'/latest',true);
  xhr.setRequestHeader('X-Master-Key',MASTER_KEY);
  xhr.setRequestHeader('X-Bin-Meta','false');
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    if(xhr.status===200){
      try{ var d=JSON.parse(xhr.responseText); syncDot('ok'); cb(null,d); }
      catch(e){ syncDot('error'); cb(e); }
    } else { syncDot('error'); cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror=function(){ syncDot('error'); cb(new Error('network')); };
  xhr.send();
}

function apiPut(data,cb){
  syncDot('loading');
  var xhr=new XMLHttpRequest();
  xhr.open('PUT',BIN_URL,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.setRequestHeader('X-Master-Key',MASTER_KEY);
  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4) return;
    if(xhr.status===200){ syncDot('ok'); if(cb) cb(null); }
    else { syncDot('error'); if(cb) cb(new Error('HTTP '+xhr.status)); }
  };
  xhr.onerror=function(){ syncDot('error'); if(cb) cb(new Error('network')); };
  xhr.send(JSON.stringify(data));
}

function loadData(){
  apiGet(function(err,d){
    if(err||!d||!d.participantes||!d.participantes.length){
      document.getElementById('loading-txt').textContent='ERROR DE CONEXIÓN';
      syncDot('error');
      setTimeout(function(){ hideLoading(); },1200);
    } else {
      DATA=d; hideLoading(); initUI();
    }
  });
}

function hideLoading(){
  var el=document.getElementById('loading-screen');
  el.style.opacity='0';
  setTimeout(function(){ el.style.display='none'; },400);
}

// ===================== UI =====================
function switchTab(tab,btn){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('screen-'+tab).classList.add('active');
  btn.classList.add('active');
  activeTab=tab;
  window.scrollTo(0,0);
  if(tab==='ranking') renderRanking();
  if(tab==='picks') renderPicks();
  if(tab==='scores') renderScores();
}

function toggleTeletexto(){
  teletextoOn=!teletextoOn;
  document.body.classList.toggle('teletexto',teletextoOn);
  document.getElementById('btn-teletexto').textContent=teletextoOn?'🎨 FUTURISTA':'📺 TELETEXTO';
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initUI(){
  var sel=document.getElementById('sel-participante');
  sel.innerHTML='<option value="">— SELECCIONA PARTICIPANTE —</option>';
  DATA.participantes.forEach(function(p){
    sel.innerHTML+='<option value="'+esc(p)+'">'+esc(p)+'</option>';
  });
  var pills=document.getElementById('score-pills');
  pills.innerHTML='<button class="pill active" onclick="setScoreGrp(\'\',this)">TODOS</button>';
  G_KEYS.forEach(function(g){
    pills.innerHTML+='<button class="pill" onclick="setScoreGrp(\''+g+'\',this)">G'+g+'</button>';
  });
  renderRanking();
}

// ===================== RANKING =====================
function renderRanking(){
  var jugados=Object.keys(DATA.resultados).length;
  var stats=DATA.participantes.map(function(p){ return calcStats(p); });
  var maxPts=stats.reduce(function(m,s){ return Math.max(m,s.pts); },0);
  document.getElementById('stats-row').innerHTML=
    sc(DATA.participantes.length,'JUGADORES')+sc(maxPts+'pts','LÍDER')+
    sc(jugados,'JUGADOS')+sc(72,'TOTAL');

  var ranked=DATA.participantes.map(function(p,i){ return {n:p,s:stats[i]}; });
  ranked.sort(function(a,b){ return b.s.pts-a.s.pts; });

  var html='';
  ranked.forEach(function(r,idx){
    var pos=idx+1;
    var ps=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
    var bh=maxPts>0?Math.round((r.s.pts/maxPts)*100):0;
    var isOpen=openRankId===r.n;
    html+='<div class="rank-row">';
    html+='<div class="rank-row-hd" onclick="toggleDetail(\''+esc(r.n)+'\')">';
    html+='<div class="rank-pos">'+ps+'</div>';
    html+='<div class="rank-bar-wrap"><div class="rank-bar" style="height:'+bh+'%"></div></div>';
    html+='<div class="rank-info"><div class="rank-name">'+esc(r.n)+'</div>';
    html+='<div class="rank-sub">'+r.s.jugados+' jugados · '+r.s.aciertos+' aciertos</div></div>';
    html+='<div class="rank-pts">'+r.s.pts+'</div>';
    html+='<span class="rank-chev'+(isOpen?' open':'')+'" id="chev-'+esc(r.n)+'">▼</span>';
    html+='</div>';
    html+='<div class="breakdown'+(isOpen?' open':'')+'" id="bd-'+esc(r.n)+'">';
    if(isOpen) html+=buildBreakdown(r.n);
    html+='</div></div>';
  });
  document.getElementById('ranking-list').innerHTML=html;
}

function sc(val,lbl){
  return '<div class="stat-card"><div class="stat-val">'+val+'</div><div class="stat-lbl">'+lbl+'</div></div>';
}

function toggleDetail(nombre){
  openRankId=openRankId===nombre?null:nombre;
  renderRanking();
}

function buildBreakdown(nombre){
  var pr=DATA.pronos[nombre]||{};
  var html='<div style="padding:8px 10px;font-size:12px;font-weight:600;color:var(--txt2);">'+esc(nombre)+' — desglose</div>';
  html+='<table><thead><tr><th>Grp</th><th style="text-align:left">Partido</th><th>Pick</th><th>Real</th><th>Pts</th></tr></thead><tbody>';
  var lastJ=null;
  getPartidosOrdenados('','').forEach(function(p){
    if(lastJ!==p.j){
      html+='<tr class="sep-row"><td colspan="5">▸ JORNADA '+p.j+'</td></tr>';
      lastJ=p.j;
    }
    var pick=pr[p.id]||'';
    var res=DATA.resultados[p.id]||'';
    var pts=calcPuntos(pick,res);
    var chip=pts===null?'<span class="chip-pend">?</span>':pts===1?'<span class="chip chip-gold">+1</span>':'<span class="chip chip-grey">0</span>';
    var signo='';
    if(res){var sp=res.split('-');if(sp.length===2){var gl=parseInt(sp[0],10),gv=parseInt(sp[1],10);if(!isNaN(gl)&&!isNaN(gv)) signo=getSigno(gl,gv);}}
    html+='<tr>';
    html+='<td><span class="badge">G'+p.g+'</span></td>';
    html+='<td class="td-match">'+p.l.e+' '+esc(p.l.n)+' – '+p.v.e+' '+esc(p.v.n)+'</td>';
    html+='<td><b style="color:var(--cyan)">'+(pick||'?')+'</b></td>';
    html+='<td>'+(signo||(res?res:'–'))+'</td>';
    html+='<td>'+chip+'</td></tr>';
  });
  html+='</tbody></table>';
  return html;
}

// ===================== PICKS =====================
function renderPicks(){
  var nombre=document.getElementById('sel-participante').value;
  var fg=document.getElementById('sel-grupo').value;
  var fj=document.getElementById('sel-jornada').value;
  if(!nombre){
    document.getElementById('picks-list').innerHTML='<div class="no-participant">SELECCIONA UN PARTICIPANTE</div>';
    return;
  }
  var pr=DATA.pronos[nombre]||{};
  var partidos=getPartidosOrdenados(fg,fj);
  var html='',lastJ=null,lastG=null;
  partidos.forEach(function(p){
    if(!fj&&lastJ!==p.j){html+='<div class="sec-lbl">▸ JORNADA '+p.j+'</div>';lastJ=p.j;lastG=null;}
    if(!fg&&lastG!==p.g){html+='<div class="grp-lbl">GRUPO '+p.g+'</div>';lastG=p.g;}
    var pick=pr[p.id]||'';
    var res=DATA.resultados[p.id]||'';
    var pts=calcPuntos(pick,res);
    var chip=pts===null?'<span class="chip-pend" style="font-size:11px">pendiente</span>':pts===1?'<span class="chip chip-gold">✓ +1</span>':'<span class="chip chip-grey">✗ 0</span>';
    var signo='';
    if(res){var sp=res.split('-');if(sp.length===2){var gl=parseInt(sp[0],10),gv=parseInt(sp[1],10);if(!isNaN(gl)&&!isNaN(gv)) signo=getSigno(gl,gv);}}
    html+='<div class="match-card">';
    html+='<div class="match-top"><span class="badge">G'+p.g+' · J'+p.j+'</span>';
    html+='<span class="match-teams">'+p.l.e+' '+esc(p.l.n)+' – '+p.v.e+' '+esc(p.v.n)+'</span>'+chip+'</div>';
    html+='<div style="display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:12px;">';
    html+='<span class="match-pick">'+(pick||'–')+'</span>';
    if(signo) html+='<span style="font-size:12px;color:var(--txt2)">Real: <b style="color:var(--txt)">'+signo+'</b> ('+res+')</span>';
    html+='</div>';
    html+='<div class="match-sub">'+p.f+(res?' · '+res:'')+'</div></div>';
  });
  if(!html) html='<div class="no-participant">Sin partidos para este filtro</div>';
  document.getElementById('picks-list').innerHTML=html;
}

// ===================== SCORES (escritura) =====================
function setScoreGrp(g,btn){
  scoreGrpFilter=g;
  document.querySelectorAll('#score-pills .pill').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  renderScores();
}

function renderScores(){
  var partidos=getPartidosOrdenados(scoreGrpFilter,'');
  var html='',lastJ=null,lastG=null;
  partidos.forEach(function(p){
    if(lastJ!==p.j){html+='<div class="sec-lbl">▸ JORNADA '+p.j+'</div>';lastJ=p.j;lastG=null;}
    if(!scoreGrpFilter&&lastG!==p.g){html+='<div class="grp-lbl">GRUPO '+p.g+'</div>';lastG=p.g;}
    var res=DATA.resultados[p.id]||'';
    var parts=res?res.split('-'):['',''];
    var glV=parts[0]||'', gvV=parts[1]||'';
    var played=res!=='';
    html+='<div class="score-card" id="sc-'+p.id+'">';
    html+='<div class="score-top">';
    html+='<span class="badge">G'+p.g+' · J'+p.j+'</span>';
    html+='<span class="match-dot '+(played?'dot-played':'dot-pending')+'" id="dot-'+p.id+'"></span>';
    html+='<span style="font-size:11px;color:var(--txt2);">'+p.f+'</span>';
    html+='</div>';
    html+='<div class="score-row">';
    html+='<div class="team-lbl">'+p.l.e+' '+esc(p.l.n)+'</div>';
    html+='<input class="score-input" id="gl-'+p.id+'" type="number" inputmode="numeric" min="0" max="20" value="'+esc(glV)+'" placeholder="–">';
    html+='<span class="score-sep">–</span>';
    html+='<input class="score-input" id="gv-'+p.id+'" type="number" inputmode="numeric" min="0" max="20" value="'+esc(gvV)+'" placeholder="–">';
    html+='<div class="team-lbl">'+p.v.e+' '+esc(p.v.n)+'</div>';
    html+='</div>';
    html+='<div class="score-actions">';
    html+='<button class="btn-save" onclick="guardarScore(\''+p.id+'\')">Guardar</button>';
    html+='<button class="btn-del" onclick="borrarScore(\''+p.id+'\')">✕ Borrar</button>';
    html+='</div>';
    html+='<div class="save-confirm" id="conf-'+p.id+'"></div>';
    html+='</div>';
  });
  if(!html) html='<div class="no-participant">Sin partidos</div>';
  document.getElementById('scores-list').innerHTML=html;
}

function guardarScore(id){
  var gl=document.getElementById('gl-'+id).value.trim();
  var gv=document.getElementById('gv-'+id).value.trim();
  if(gl===''&&gv===''){ borrarScore(id); return; }
  if(gl===''||gv===''){ showConf(id,'⚠ Introduce ambos goles',true); return; }
  DATA.resultados[id]=gl+'-'+gv;
  apiPut(DATA,function(err){
    if(!err){ showConf(id,'▸ Guardado en la nube ✓',false); updDot(id,true); if(activeTab==='ranking') renderRanking(); }
    else showConf(id,'✗ Error al guardar',true);
  });
}

function borrarScore(id){
  delete DATA.resultados[id];
  var gl=document.getElementById('gl-'+id);
  var gv=document.getElementById('gv-'+id);
  if(gl) gl.value=''; if(gv) gv.value='';
  apiPut(DATA,function(err){
    if(!err){ showConf(id,'▸ Resultado borrado ✓',true); updDot(id,false); if(activeTab==='ranking') renderRanking(); }
    else showConf(id,'✗ Error al borrar',true);
  });
}

function updDot(id,played){
  var d=document.getElementById('dot-'+id);
  if(d) d.className='match-dot '+(played?'dot-played':'dot-pending');
}

function showConf(id,msg,isDel){
  var el=document.getElementById('conf-'+id);
  if(!el) return;
  el.className=isDel?'del-confirm':'save-confirm';
  el.textContent=msg;
  setTimeout(function(){ if(el) el.textContent=''; },2500);
}

loadData();
</script>
